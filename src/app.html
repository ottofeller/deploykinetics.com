<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" sizes="32x32" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script>
      // https://github.com/w3c/csswg-drafts/issues/6026 - "--page-scrollbar-width" sets the width of the scrollbar where 100vw does not take it into account.
      document.addEventListener('DOMContentLoaded', () => {
        const outerMarkerElement = document.createElement('div')
        document.documentElement.appendChild(outerMarkerElement)
        outerMarkerElement.style = 'position: fixed; inset: 0; height: 0; width: 100vw'

        const innerMarkerElement = document.createElement('div')
        document.documentElement.appendChild(innerMarkerElement)
        innerMarkerElement.style = 'position: fixed; inset: 0; height: 0;'

        new ResizeObserver(() =>
          document.documentElement.style.setProperty(
            '--page-scrollbar-width',
            outerMarkerElement.offsetWidth - innerMarkerElement.offsetWidth,
          ),
        ).observe(innerMarkerElement)
      })
    </script>

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <!-- Workaround to fix https://bugs.chromium.org/p/chromium/issues/detail?id=813094. -->
    <div class="fixed inset-0 z-50 overflow-y-scroll overscroll-none bg-08090a scrollbar-hidden" id="loading-layer">
      <div class="bottom-0 h-[calc(100%+1px)]">
        <div class="sticky top-0 grid h-[calc(100%-1px)] place-items-center">
          <style>
            :root {
              scrollbar-color: transparent transparent;
            }
            @property --slide-progress {
              syntax: '<number>';
              inherits: false;
              initial-value: 1;
            }
            @property --fill-progress {
              syntax: '<number>';
              inherits: false;
              initial-value: 0;
            }
            @property --opacity-progress {
              syntax: '<number>';
              inherits: false;
              initial-value: 1;
            }
            @keyframes --start-progress {
              0% {
                --slide-progress: 1;
              }
              100% {
                --slide-progress: 0;
              }
            }
            @keyframes --finish-progress {
              0% {
                --slide-progress: 0;
              }
              100% {
                --slide-progress: -1;
              }
            }
            @keyframes --hide-progress {
              0% {
                --opacity-progress: 1;
              }
              100% {
                --opacity-progress: 0;
              }
            }
            #loading-layer {
              opacity: var(--opacity-progress);
              &.finish {
                animation-name: --hide-progress;
                animation-duration: 500ms;
                animation-fill-mode: forwards;
              }
            }
            #loading-layer-logo {
              --width: 126px;
              --height: 22px;
              width: var(--width);
              height: var(--height);

              background-image: linear-gradient(
                to right,
                #ffffff calc(100% * var(--fill-progress)),
                #29292a calc(100% * var(--fill-progress))
              );

              mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 16'><path d='M6.22 0h2.27v15.77H6.22zM2.7 0h1.35v15.77H2.7zM0 0h.53v15.77H0zm25.78.95h2.37v2.23h-2.37zm38.84 0h2.36V3.2h-2.36zm-51.5 6.69L21.4 0h3.11l-8.49 7.64 8.75 8.13H21.4zm12.66 8.13V4.3h2.37v11.47zm4.65 0V4.3h2.36v1.18a4.8 4.8 0 0 1 3.58-1.4q1.35 0 2.4.56t1.64 1.58c.6 1.02.59 1.46.59 2.34v7.21h-2.34V8.95q0-1.35-.8-2.12a3 3 0 0 0-2.15-.8q-.95 0-1.7.4-.74.38-1.22 1.1v8.24zm18.52.21a6.2 6.2 0 0 1-5.42-2.93q-.82-1.35-.82-3.02a5.8 5.8 0 0 1 2.95-5.14 5.9 5.9 0 0 1 5.96.02 6.1 6.1 0 0 1 2.83 5.23v.63h-9.38a4 4 0 0 0 .7 1.67 4 4 0 0 0 3.28 1.6q.88 0 1.66-.25.8-.27 1.35-.74l1.5 1.42q-1.03.76-2.15 1.15-1.12.36-2.46.36m-3.88-6.92h7.04a3.8 3.8 0 0 0-1.9-2.64 3.5 3.5 0 0 0-3.23-.02q-.74.39-1.23 1.08-.49.68-.68 1.58m15.87 6.92q-1.74 0-2.65-.77-.9-.78-.9-2.27V6.2h-2.53V4.3h2.52V.95h2.34V4.3h3.5v1.9h-3.5v6.22q0 .87.4 1.26.39.36 1.35.36a5 5 0 0 0 1.71-.3v1.92q-.47.15-1.1.23t-1.14.09m3.68-.21V4.3h2.36v11.47zm10.06.21a6 6 0 0 1-5.3-2.93q-.82-1.35-.82-3.02t.8-3.03a6 6 0 0 1 5.31-2.93 7 7 0 0 1 4.8 1.9L78 7.52a4.5 4.5 0 0 0-3.27-1.45q-1.08 0-1.97.52-.85.52-1.38 1.42-.51.9-.51 2 0 1.11.51 2.01c.51.9.81 1.08 1.4 1.42q.92.52 2 .52a4.3 4.3 0 0 0 3.2-1.37l1.42 1.46a6.7 6.7 0 0 1-4.72 1.92m10.34.03q-1.55 0-2.9-.43a7 7 0 0 1-2.31-1.26l1.28-1.51q.91.72 1.9 1.08.97.36 1.96.36 1.26 0 2.06-.47c.8-.47.8-.72.8-1.22q0-.63-.47-.97-.48-.36-1.45-.5l-2.15-.3a5 5 0 0 1-2.67-1.07 2.8 2.8 0 0 1-.89-2.16q0-1.05.59-1.8.58-.79 1.63-1.22a6 6 0 0 1 2.46-.45 8.4 8.4 0 0 1 4.77 1.49l-1.17 1.48a9 9 0 0 0-1.92-.92q-.9-.3-1.87-.3-1.05 0-1.73.46-.66.43-.65 1.12 0 .64.46.97.46.35 1.5.5l2.15.3a5 5 0 0 1 2.69 1.03q.9.81.91 2.16 0 1.05-.65 1.87-.66.81-1.78 1.29a7 7 0 0 1-2.55.47M13.12 0h-2.47v15.77h2.47z'/></svg>");
              mask-repeat: no-repeat;
              mask-position: 0 calc(var(--height) * var(--slide-progress));
              mask-size: contain;
              animation-name: var(--animation-name);
              animation-duration: 500ms;
              animation-fill-mode: forwards;
              animation-timing-function: var(--animation-timing-function);
              &.start {
                --animation-name: --start-progress;
                --animation-timing-function: ease-out;
              }
              &.finish {
                --animation-name: --finish-progress;
                --animation-timing-function: ease-in;
              }
            }
          </style>

          <div id="loading-layer-logo" class="fill-ffffff will-change-transform"></div>

          <script>
            const easeOut = (t) => 1 - (1 - t) ** 3
            const easeIn = (t) => t ** 3
            const startTargetDuration = 2000
            const startTargetProgress = 0.75
            const finishDuration = 1000
            const waitingTime = 300
            let progress = 0
            let isFinishing = false
            let finishStartValue = 0
            let finishStartTime = 0
            let resolvePromise

            const onFinish = () => {
              const loadingLayerElement = document.querySelector('#loading-layer')
              loadingLayerElement.addEventListener('animationend', loadingLayerElement.remove, {capture: true})
              loadingLayerElement.classList.add('finish')
            }

            let isStarted = false

            const startTimerId = setTimeout(() => {
              isStarted = true
              const loadingLayerLogoElement = document.querySelector('#loading-layer-logo')
              let lastTime = 0

              const animate = (time) => {
                progress = isFinishing
                  ? finishStartValue +
                    (1 - finishStartValue) * easeIn(Math.min((time - finishStartTime) / finishDuration, 1))
                  : progress +
                    (startTargetProgress - progress) * easeOut(Math.min((time - lastTime) / startTargetDuration, 1))

                lastTime = time
                loadingLayerLogoElement.style.setProperty('--fill-progress', progress)

                if (progress < 1) {
                  requestAnimationFrame(animate)
                } else {
                  loadingLayerLogoElement.classList.add('finish')

                  loadingLayerLogoElement.addEventListener(
                    'animationend',

                    () => {
                      resolvePromise()
                      onFinish()
                    },
                  )
                }
              }

              loadingLayerLogoElement.addEventListener(
                'animationend',

                () => {
                  lastTime = performance.now()
                  requestAnimationFrame(animate)
                },

                {once: true},
              )

              loadingLayerLogoElement.classList.add('start')
            }, waitingTime)

            window.finishStartingAnimation = () => {
              if (isStarted) {
                isFinishing = true
                finishStartValue = progress
                finishStartTime = performance.now()

                return new Promise((resolve) => {
                  resolvePromise = resolve
                })
              } else {
                clearTimeout(startTimerId)
                onFinish()
                return null
              }
            }
          </script>
        </div>
      </div>
    </div>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
